<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #player {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="player"></div>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const videoId = params.get("videoId") || "";
    const autoplay = params.get("autoplay") || "1";
    const origin = window.location.origin;

    function notifyHost(message) {
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(message);
      }
    }

    function onYouTubeIframeAPIReady() {
      if (!videoId) {
        notifyHost("YT_ERROR_NO_VIDEO_ID");
        return;
      }

      new YT.Player('player', {
        width: '100%',
        height: '100%',
        videoId: videoId,
        playerVars: {
          autoplay: Number(autoplay) || 1,
          rel: 0,
          modestbranding: 1,
          playsinline: 1,
          enablejsapi: 1,
          origin: origin
        },
        events: {
          onReady: function () { notifyHost("YT_READY"); },
          onError: function (ev) {
            const code = ev && ev.data ? String(ev.data) : "unknown";
            notifyHost("YT_ERROR_" + code);
          }
        }
      });
    }
  </script>
</body>
</html>
